name: Capture GitHub traction

# Daily snapshot capture (U4′). Runs scripts/capture.ts against the GitHub API and
# commits the JSON store — git history IS the time-series log. The commit to main
# triggers deploy.yml, so the site refreshes with each day's data.
#
# Public repos → committed data/; private repos → data/.local/ (gitignored, never
# committed). The only secret is GH_PAT (fine-grained, read-only) — see GS-001.

on:
  schedule:
    - cron: '17 6 * * *' # daily ~06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

# Never run two captures at once; don't cancel an in-flight one.
concurrency:
  group: capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture
        run: pnpm capture
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Commit data (if changed)
        run: |
          git config user.name "groundswell-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "chore(data): daily capture $(date -u +%Y-%m-%d)"
            git push
          fi
